name: Deploy Frontend

on:
  push:
    branches: [ frontend ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /var/www/frontend
            git pull origin frontend
            npm install
            npm run build
            # Zero Downtime: reload espera a que la nueva versión esté lista antes de apagar la vieja
            pm2 reload miles-front --update-env || pm2 start npm --name miles-front -- start
